# Next.js on Netlify: plugin runs Next build and configures API routes / serverless correctly
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Run migrations then build (plugin runs next build)
[build]
  command = "npx prisma generate && npx prisma migrate deploy && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
